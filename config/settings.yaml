# Production RAG System Configuration

chunking:
  target_tokens: 600
  max_tokens: 800
  min_tokens: 100
  overlap_tokens: 100
  tokenizer: "cl100k_base"

retrieval:
  initial_top_k: 20          # Candidates from hybrid search
  final_top_k: 5             # After re-ranking
  hybrid_alpha: 0.6           # Weight for vector search (1-alpha for BM25)
  reranker_threshold: 0.3     # Min score to consider evidence sufficient

embedding:
  model: "all-MiniLM-L6-v2"
  dimension: 384

reranker:
  model: "cross-encoder/ms-marco-MiniLM-L6-v2"

llm:
  provider: "groq"
  model: "llama-3.3-70b-versatile"
  temperature: 0.1
  max_output_tokens: 1024

vector_store:
  persist_directory: "./chroma_db"
  collection_name: "rag_documents"

evaluation:
  thresholds:
    faithfulness: 0.75
    answer_relevancy: 0.70
    context_precision: 0.65
    context_recall: 0.60

server:
  host: "0.0.0.0"
  port: 8000
